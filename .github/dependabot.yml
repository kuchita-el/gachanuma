version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
      testing:
        patterns:
          - "vitest"
          - "@vitejs/plugin-react"
          - "@testing-library/*"
          - "jsdom"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
